spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/skillbridge
    username: postgres
    password: 5432

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: never

server:
  port: 8080

gemini:
  api-key: ${GEMINI_API_KEY}